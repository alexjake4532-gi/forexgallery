<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forex Entry Journal</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <button type="button" class="settings-button" id="settingsButton" aria-label="Open settings">⚙</button>

    <main class="app-shell">
      <section class="auth-view" id="authView">
        <div class="brand-panel">
          <p class="eyebrow">Forex Journal</p>
          <h1>Track every entry with screenshots, notes, and discipline.</h1>
        </div>

        <form class="auth-card" id="authForm">
          <h2 id="authTitle">Sign in</h2>
          <label>
            Email
            <input id="emailInput" type="email" autocomplete="email" required />
          </label>
          <label>
            Password
            <input id="passwordInput" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit" id="authSubmit">Sign in</button>
          <button type="button" class="ghost-button" id="toggleAuth">Create account</button>
          <p class="message" id="authMessage"></p>
        </form>
      </section>

      <section class="journal-view hidden" id="journalView">
        <header class="topbar">
          <div>
            <p class="eyebrow">Entry Archive</p>
            <h1>Trade screenshots</h1>
          </div>
          <button type="button" class="ghost-button" id="signOutButton">Sign out</button>
        </header>

        <section class="entry-layout">
          <form class="entry-form" id="entryForm">
            <h2>New entry</h2>
            <label>
              Pair
              <input id="pairInput" type="text" placeholder="EURUSD" required />
            </label>
            <label>
              Direction
              <select id="directionInput" required>
                <option value="buy">Buy</option>
                <option value="sell">Sell</option>
              </select>
            </label>
            <div class="number-grid">
              <label>
                Entry
                <input id="entryPriceInput" type="number" step="0.00001" />
              </label>
              <label>
                Stop loss
                <input id="stopLossInput" type="number" step="0.00001" />
              </label>
              <label>
                Take profit
                <input id="takeProfitInput" type="number" step="0.00001" />
              </label>
            </div>
            <label>
              Screenshot
              <input id="imageInput" type="file" accept="image/*" required />
            </label>
            <label>
              Notes
              <textarea id="notesInput" rows="4" placeholder="Why did you enter? What was the setup?"></textarea>
            </label>
            <button type="submit" id="saveEntryButton">Save entry</button>
            <p class="message" id="entryMessage"></p>
          </form>

          <div class="entries-panel">
            <div class="panel-header">
              <h2>Saved entries</h2>
              <button type="button" class="ghost-button" id="refreshButton">Refresh</button>
            </div>
            <p class="message" id="entriesMessage"></p>
            <div class="entries-grid" id="entriesGrid"></div>
          </div>
        </section>
      </section>
    </main>

    <div class="image-viewer hidden" id="imageViewer" aria-hidden="true">
      <div class="viewer-topbar">
        <div>
          <p class="eyebrow">Screenshot</p>
          <h2 id="viewerTitle">Trade entry</h2>
        </div>
        <div class="viewer-actions">
          <button type="button" class="ghost-button" id="zoomOutButton">Zoom out</button>
          <button type="button" class="ghost-button" id="zoomResetButton">Reset</button>
          <button type="button" class="ghost-button" id="zoomInButton">Zoom in</button>
          <button type="button" id="closeViewerButton">Close</button>
        </div>
      </div>
      <div class="viewer-stage">
        <img id="viewerImage" alt="Expanded trade screenshot" />
      </div>
    </div>

    <aside class="settings-panel hidden" id="settingsPanel" aria-hidden="true">
      <div class="settings-header">
        <div>
          <p class="eyebrow">Settings</p>
          <h2>Theme</h2>
        </div>
        <button type="button" class="ghost-button" id="closeSettingsButton">Close</button>
      </div>
      <div class="theme-options" role="group" aria-label="Theme options">
        <button type="button" class="theme-option active" data-theme-option="dark">
          <span class="theme-swatch dark-swatch"></span>
          <span>Dark glass</span>
        </button>
        <button type="button" class="theme-option" data-theme-option="light">
          <span class="theme-swatch light-swatch"></span>
          <span>Light glass</span>
        </button>
      </div>
    </aside>

    <script src="app.js"></script>
  </body>
</html>
